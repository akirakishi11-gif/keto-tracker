  </div>

  <!-- 食材追加モーダル -->

  <div id="cal-modal" style="display:none;position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,0.5);z-index:200;align-items:flex-end;justify-content:flex-end;flex-direction:column">
    <div style="background:#fff;width:100%;max-width:480px;margin:0 auto;border-radius:16px 16px 0 0;padding:20px;max-height:85vh;overflow-y:auto">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px">
        <div style="font-size:16px;font-weight:700;color:#1a1a1a" id="modal-title">食材を追加</div>
        <button onclick="closeCalModal()" style="background:none;border:none;font-size:22px;color:#aaa;cursor:pointer">×</button>
      </div>
      <!-- モーダル内検索 -->
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <input type="text" id="modal-search" placeholder="食材名を入力..."
          style="flex:1;border:1px solid #ddd;border-radius:8px;padding:8px 10px;font-size:14px;font-family:inherit"
          oninput="modalSearch(this.value)">
      </div>
      <div id="modal-food-list" style="max-height:50vh;overflow-y:auto"></div>
    </div>
  </div>

  <!-- SETTINGS TAB -->

  <div id="tab-settings" class="hidden">
    <div class="card">
