// ─── STATE ───────────────────────────────────────────────
let currentTab = "today";
let currentCat = "野菜";
let openDetail = null;
let expandDay  = null;
let gramValues = {};
let toastTimer = null;

function getToday() { return new Date().toISOString().split("T")[0]; }
function loadLog() { try { return JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}"); } catch { return {}; } }
function saveLog(l) { try { localStorage.setItem(STORAGE_KEY, JSON.stringify(l)); } catch {} }

function carbsColor(c) {
  if (c <= 2)  return "#2e7d32";
  if (c <= 5)  return "#558b2f";
  if (c <= 10) return "#f57f17";
  return "#c62828";
}

// ─── INIT ────────────────────────────────────────────────
document.addEventListener("DOMContentLoaded", () => {
  const today = getToday();
  document.getElementById("header-date").textContent =
    today + " · 糖質20g以下 / 1500kcal（18h断食）";
  renderCatButtons();
  renderFoodList();
  renderToday();
  renderHistory();
  renderWeightToday();
  initDateSelects();
});

// ─── TAB SWITCH ──────────────────────────────────────────
function switchTab(tab) {
  currentTab = tab;
  ["today","add","history","weight","calendar","settings"].forEach(t => {
    const el = document.getElementById("tab-" + t);
    if (el) el.classList.toggle("hidden", t !== tab);
    const btn = document.getElementById("nav-" + t);
    if (btn) btn.classList.toggle("active", t === tab);
  });
  if (tab === "history")  renderHistory();
  if (tab === "weight")   renderWeightTab();
  if (tab === "calendar") renderCalendar();
}

// ─── CATEGORY BUTTONS ────────────────────────────────────
function renderCatButtons() {
  const row = document.getElementById("cat-row");
  row.innerHTML = "";
  Object.keys(FOOD_DB).forEach(cat => {
    const btn = document.createElement("button");
    btn.className = "cat-btn";
    btn.textContent = cat;
    btn.style.background = cat === currentCat ? CAT_COLORS[cat] : "#ebebeb";
    btn.style.color      = cat === currentCat ? "#fff" : "#555";
    btn.style.fontWeight = cat === currentCat ? "700" : "500";
    btn.onclick = () => { currentCat = cat; openDetail = null; renderCatButtons(); renderFoodList(); };
    row.appendChild(btn);
  });
  document.getElementById("cat-label").textContent = currentCat;
}

// ─── FOOD LIST ───────────────────────────────────────────
function renderFoodList() {
  document.getElementById("cat-label").textContent = currentCat;
  const list = document.getElementById("food-list");
  list.innerHTML = "";
  const foods = [...(FOOD_DB[currentCat] || [])].sort((a,b) => a.carbs - b.carbs);

  foods.forEach(food => {
    const wrap = document.createElement("div");

    // FOOD ROW
    const row = document.createElement("div");
    row.className = "food-row";

    // Name
    const nameDiv = document.createElement("div");
    nameDiv.className = "food-name";
    nameDiv.textContent = food.name;
    nameDiv.onclick = () => {
      openDetail = openDetail === food.name ? null : food.name;
      renderFoodList();
    };

    // Carbs
    const carbsDiv = document.createElement("div");
    carbsDiv.className = "food-carbs";
    carbsDiv.style.cssText = `color:${carbsColor(food.carbs)};width:52px;text-align:center;font-size:13px;font-weight:700`;
    carbsDiv.textContent = food.carbs + "g";

    // Kcal
    const kcalDiv = document.createElement("div");
    kcalDiv.className = "food-kcal";
    kcalDiv.style.cssText = "width:40px;text-align:center;font-size:12px;color:#999";
    kcalDiv.textContent = food.kcal;

    // Gram input
    const gramWrap = document.createElement("div");
    gramWrap.className = "gram-wrap";
    gramWrap.style.width = "58px";
    const inp = document.createElement("input");
    inp.className = "gram-input";
    inp.style.width = "52px";
    inp.inputMode = "numeric";
    inp.pattern = "[0-9]*";
    inp.value = gramValues[food.name] !== undefined ? gramValues[food.name] : 100;

    inp.addEventListener("focus", () => inp.select());
    inp.addEventListener("wheel", e => e.preventDefault(), { passive: false });
    inp.addEventListener("blur", () => {
      let n = parseInt(inp.value, 10);
      if (isNaN(n) || n < 1) n = 1;
      if (n > 9999) n = 9999;
      inp.value = n;
      gramValues[food.name] = n;
    });
    inp.addEventListener("keydown", e => { if (e.key === "Enter") inp.blur(); });
    gramWrap.appendChild(inp);

    // 🔍 search icon button
    const searchBtn = document.createElement("button");
    searchBtn.style.cssText = "background:none;border:none;font-size:15px;cursor:pointer;padding:0 2px;width:26px;flex-shrink:0";
    searchBtn.textContent = "🔍";
    searchBtn.title = "AI検索";
    searchBtn.onclick = () => {
      document.getElementById("ai-search-input").value = food.name;
      document.getElementById("search-suggestions").innerHTML = "";
      document.getElementById("ai-result").innerHTML = "";
      window.scrollTo(0, 0);
      document.getElementById("ai-search-input").focus();
    };

    // Add button
    const addBtn = document.createElement("button");
    addBtn.className = "add-btn";
    addBtn.style.cssText = "background:#2e7d32;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;white-space:nowrap;font-family:inherit;flex-shrink:0";
    addBtn.textContent = "追加";
    addBtn.onclick = () => {
      const g = parseInt(inp.value, 10) || 100;
      addEntry(food, g);
    };

    row.appendChild(nameDiv);
    row.appendChild(carbsDiv);
    row.appendChild(kcalDiv);
    row.appendChild(gramWrap);
    row.appendChild(searchBtn);
    row.appendChild(addBtn);
    wrap.appendChild(row);

    // DETAIL PANEL
    if (openDetail === food.name) {
      const panel = document.createElement("div");
      panel.className = "detail-panel";
      panel.innerHTML = `
        <div class="detail-grid">
          <span>糖質</span><span style="font-weight:700;color:#c62828">${food.carbs}g</span>
          <span>タンパク質</span><span style="font-weight:700;color:#1565c0">${food.protein}g</span>
          <span>脂質</span><span style="font-weight:700;color:#e65100">${food.fat}g</span>
          <span>カロリー</span><span style="font-weight:700;color:#6a1b9a">${food.kcal}kcal</span>
          <span>食物繊維</span><span style="font-weight:700;color:#2e7d32">${food.fiber}g</span>
        </div>
        <div class="detail-note">※100gあたり</div>`;
      wrap.appendChild(panel);
    }

    list.appendChild(wrap);
  });
}

// ─── ADD ENTRY ───────────────────────────────────────────
function addEntry(food, g) {
  const r = g / 100;
  const entry = {
    name:    food.name,
    grams:   g,
    kcal:    Math.round(food.kcal    * r * 10) / 10,
    protein: Math.round(food.protein * r * 10) / 10,
    fat:     Math.round(food.fat     * r * 10) / 10,
    carbs:   Math.round(food.carbs   * r * 10) / 10,
    fiber:   Math.round(food.fiber   * r * 10) / 10,
    category: currentCat,
    time:    new Date().toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" }),
    id:      Date.now() + Math.random(),
  };
  const log = loadLog();
  const today = getToday();
  if (!log[today]) log[today] = [];
  log[today].push(entry);
  saveLog(log);
  showToast(food.name + " " + g + "g を追加しました");
  switchTab("today");
  renderToday();
}

// ─── REMOVE ENTRY ────────────────────────────────────────
function removeEntry(id) {
  const log = loadLog();
  const today = getToday();
  log[today] = (log[today] || []).filter(e => e.id !== id);
  saveLog(log);
  renderToday();
}

// ─── RENDER TODAY ────────────────────────────────────────
function renderToday() {
  const log     = loadLog();
  const today   = getToday();
  const entries = log[today] || [];
  const t = entries.reduce(
    (a,e) => ({ kcal:a.kcal+e.kcal, protein:a.protein+e.protein, fat:a.fat+e.fat, carbs:a.carbs+e.carbs, fiber:a.fiber+(e.fiber||0) }),
    { kcal:0, protein:0, fat:0, carbs:0, fiber:0 }
  );

  // Macro bars
  const macros = [
    { id:"carbs",   val:t.carbs,   target:TARGETS.carbs,    color:"#2e7d32" },
    { id:"protein", val:t.protein, target:TARGETS.protein,  color:"#1565c0" },
    { id:"fat",     val:t.fat,     target:TARGETS.fat,      color:"#e65100" },
    { id:"kcal",    val:t.kcal,    target:TARGETS.calories, color:"#6a1b9a" },
    { id:"fiber",   val:t.fiber,   target:25,               color:"#00838f" },
  ];
  macros.forEach(m => {
    const pct  = Math.min((m.val / m.target) * 100, 100);
    const over = m.val > m.target;
    const el   = document.getElementById("v-" + m.id);
    if (el) { el.textContent = Math.round(m.val); el.style.color = over ? "#c62828" : m.color; }
    const bar = document.getElementById("b-" + m.id);
    if (bar) { bar.style.width = pct + "%"; bar.style.background = over ? "#c62828" : m.color; }
  });

  // Summary boxes
  document.getElementById("s-carbs").textContent   = Math.round(t.carbs*10)/10 + "g";
  document.getElementById("s-protein").textContent = Math.round(t.protein*10)/10 + "g";
  document.getElementById("s-fat").textContent     = Math.round(t.fat*10)/10 + "g";
  document.getElementById("s-kcal").textContent    = Math.round(t.kcal) + " kcal";
  document.getElementById("s-fiber").textContent   = Math.round(t.fiber*10)/10 + "g";

  // Keto score
  const ks = Math.max(0, Math.min(100, Math.round(100 - (t.carbs / TARGETS.carbs) * 100)));
  const sc = ks >= 80 ? "#2e7d32" : ks >= 50 ? "#f57f17" : "#c62828";
  const scoreEl = document.getElementById("keto-score");
  scoreEl.textContent = ks;
  scoreEl.style.color = sc;

  // Entries
  document.getElementById("today-count").textContent = "今日の記録（" + entries.length + "件）";
  const container = document.getElementById("today-entries");
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty">まだ記録がありません<br>「追加」タブから食材を選んでください</div>';
    return;
  }
  container.innerHTML = "";
  [...entries].reverse().forEach(e => {
    const div = document.createElement("div");
    div.className = "entry";
    div.innerHTML = `
      <div style="flex:1">
        <div class="entry-name">${e.name} <span class="entry-grams">${e.grams}g</span></div>
        <div>
          <span class="tag" style="background:#c6282818;color:#c62828">糖質 ${e.carbs}g</span>
          <span class="tag" style="background:#1565c018;color:#1565c0">P ${e.protein}g</span>
          <span class="tag" style="background:#e6510018;color:#e65100">F ${e.fat}g</span>
          <span class="tag" style="background:#55555518;color:#555">${e.kcal}kcal</span>
          ${(e.fiber > 0) ? `<span class="tag" style="background:#00838f18;color:#00838f">繊維 ${e.fiber}g</span>` : ''}
        </div>
        <div class="entry-meta">${e.time} · ${e.category}</div>
      </div>
      <button class="del-btn" onclick="removeEntry(${e.id})">×</button>`;
    container.appendChild(div);
  });
}

// ─── RENDER HISTORY ──────────────────────────────────────
function renderHistory() {
  const log  = loadLog();
  const days = Object.keys(log).sort((a,b) => b.localeCompare(a)).slice(0,14);
  const container = document.getElementById("history-list");
  if (days.length === 0) {
    container.innerHTML = '<div class="empty">履歴がありません</div>';
    return;
  }
  container.innerHTML = "";
  days.forEach(day => {
    const entries = log[day] || [];
    const t = entries.reduce(
      (a,e) => ({ kcal:a.kcal+e.kcal, protein:a.protein+e.protein, fat:a.fat+e.fat, carbs:a.carbs+e.carbs }),
      { kcal:0, protein:0, fat:0, carbs:0 }
    );
    const ks = Math.max(0, Math.min(100, Math.round(100 - (t.carbs / TARGETS.carbs) * 100)));
    const sc = ks >= 80 ? "#2e7d32" : ks >= 50 ? "#f57f17" : "#c62828";
    const isOpen = expandDay === day;

    const row = document.createElement("div");
    row.className = "hist-row";
    row.innerHTML = `
      <div class="hist-top">
        <div>
          <div class="hist-date">${day}</div>
          <div class="hist-count">${entries.length}食記録</div>
        </div>
        <div style="text-align:right">
          <div class="hist-score" style="color:${sc}">${ks}</div>
          <div class="hist-score-label">KETO</div>
        </div>
      </div>
      <div style="margin-top:6px">
        <span class="tag" style="background:#c6282818;color:#c62828">糖質 ${Math.round(t.carbs*10)/10}g</span>
        <span class="tag" style="background:#1565c018;color:#1565c0">P ${Math.round(t.protein*10)/10}g</span>
        <span class="tag" style="background:#e6510018;color:#e65100">F ${Math.round(t.fat*10)/10}g</span>
        <span class="tag" style="background:#55555518;color:#555">${Math.round(t.kcal)}kcal</span>
      </div>
      ${isOpen ? `<div class="hist-detail">${entries.map(e =>
        `<div class="hist-entry"><strong style="color:#333">${e.name}</strong> ${e.grams}g
        <span style="color:#bbb;margin-left:8px">糖質${e.carbs}g · ${e.kcal}kcal</span></div>`
      ).join("")}</div>` : ""}`;

    row.onclick = () => { expandDay = isOpen ? null : day; renderHistory(); };
    container.appendChild(row);
  });
}

// ─── CALENDAR ────────────────────────────────────────────
let calYear  = new Date().getFullYear();
let calMonth = new Date().getMonth(); // 0-indexed
let calSelectedDate = null;

function renderCalendar() {
  const log     = loadLog();
  const wlog    = loadWeightLog();
  const title   = document.getElementById("cal-title");
  const grid    = document.getElementById("cal-grid");
  if (!title || !grid) return;

  title.textContent = calYear + "年" + (calMonth + 1) + "月";
  grid.innerHTML = "";

  // 月の最初の曜日（月曜起点: 月=0, 日=6）
  const firstDay = new Date(calYear, calMonth, 1).getDay();
  const offset   = (firstDay === 0) ? 6 : firstDay - 1;
  const daysInMonth = new Date(calYear, calMonth + 1, 0).getDate();
  const today    = getToday();

  // 空白セル
  for (let i = 0; i < offset; i++) {
    grid.appendChild(document.createElement("div"));
  }

  for (let d = 1; d <= daysInMonth; d++) {
    const dateStr = calYear + "-" + String(calMonth + 1).padStart(2,"0") + "-" + String(d).padStart(2,"0");
    const hasFood   = log[dateStr] && log[dateStr].length > 0;
    const hasWeight = !!wlog[dateStr];
    const isToday   = dateStr === today;
    const isSelected = dateStr === calSelectedDate;

    const cell = document.createElement("div");
    cell.style.cssText = `
      text-align:center;padding:6px 2px;border-radius:8px;cursor:pointer;position:relative;
      font-size:14px;font-weight:${isToday ? "800" : "400"};
      background:${isSelected ? "#2e7d32" : isToday ? "#e8f5e9" : "#fff"};
      color:${isSelected ? "#fff" : isToday ? "#2e7d32" : "#1a1a1a"};
      border:${isSelected ? "2px solid #2e7d32" : isToday ? "1px solid #a5d6a7" : "1px solid #f0f0f0"};
    `;
    cell.textContent = d;

    // ドット（食事・体重の記録あり）
    if (hasFood || hasWeight) {
      const dots = document.createElement("div");
      dots.style.cssText = "display:flex;justify-content:center;gap:2px;margin-top:2px";
      if (hasFood) {
        const dot = document.createElement("div");
        dot.style.cssText = `width:4px;height:4px;border-radius:50%;background:${isSelected?"#fff":"#2e7d32"}`;
        dots.appendChild(dot);
      }
      if (hasWeight) {
        const dot = document.createElement("div");
        dot.style.cssText = `width:4px;height:4px;border-radius:50%;background:${isSelected?"#fff":"#1565c0"}`;
        dots.appendChild(dot);
      }
      cell.appendChild(dots);
    }

    cell.onclick = () => selectCalDate(dateStr);
    grid.appendChild(cell);
  }

  // 選択日の内容を表示
  if (calSelectedDate) selectCalDate(calSelectedDate);
}

function calPrevMonth() {
  calMonth--;
  if (calMonth < 0) { calMonth = 11; calYear--; }
  renderCalendar();
}

function calNextMonth() {
  calMonth++;
  if (calMonth > 11) { calMonth = 0; calYear++; }
  renderCalendar();
}

function selectCalDate(dateStr) {
  calSelectedDate = dateStr;
  renderCalendar();

  const parts = dateStr.split("-");
  const label = parts[0] + "年" + parseInt(parts[1]) + "月" + parseInt(parts[2]) + "日";
  document.getElementById("cal-day-title").textContent = label + "の記録";
  document.getElementById("cal-add-btn").style.display = "block";

  // 体重表示
  const wlog = loadWeightLog();
  const wRow = document.getElementById("cal-weight-row");
  wRow.style.display = "flex";
  const wInp = document.getElementById("cal-weight-input");
  const wDisp = document.getElementById("cal-weight-display");
  if (wlog[dateStr]) {
    const diff = Math.round((wlog[dateStr] - 80.0) * 10) / 10;
    wDisp.textContent = wlog[dateStr] + "kg（" + (diff > 0 ? "+" : "") + diff + "kg）";
    wInp.value = wlog[dateStr];
  } else {
    wDisp.textContent = "未記録";
    wInp.value = "";
  }

  // 食事記録
  const log     = loadLog();
  const entries = log[dateStr] || [];
  const container = document.getElementById("cal-entries");
  if (entries.length === 0) {
    container.innerHTML = '<div class="empty" style="padding:16px 0">食事の記録がありません</div>';
    return;
  }
  container.innerHTML = "";
  entries.forEach(e => {
    const div = document.createElement("div");
    div.style.cssText = "display:flex;align-items:flex-start;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:8px";
    div.innerHTML = `
      <div style="flex:1">
        <div style="font-size:15px;font-weight:700;color:#222">${e.name} <span style="font-size:12px;color:#bbb;font-weight:400">${e.grams}g</span></div>
        <div>
          <span class="tag" style="background:#c6282818;color:#c62828">糖質 ${e.carbs}g</span>
          <span class="tag" style="background:#1565c018;color:#1565c0">P ${e.protein}g</span>
          <span class="tag" style="background:#e6510018;color:#e65100">F ${e.fat}g</span>
          <span class="tag" style="background:#55555518;color:#555">${e.kcal}kcal</span>
          ${e.fiber > 0 ? `<span class="tag" style="background:#00838f18;color:#00838f">繊維 ${e.fiber}g</span>` : ""}
        </div>
        <div style="font-size:11px;color:#bbb;margin-top:3px">${e.time || ""} · ${e.category}</div>
      </div>
      <button onclick="removeCalEntry('${dateStr}',${e.id})"
        style="background:none;border:1px solid #e0e0e0;color:#ccc;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px;flex-shrink:0">×</button>`;
    container.appendChild(div);
  });
}

function saveCalWeight() {
  if (!calSelectedDate) return;
  const raw = document.getElementById("cal-weight-input").value.replace(/,/g, ".");
  const val = parseFloat(raw);
  if (isNaN(val) || val < 30 || val > 300) { showToast("⚠ 正しい体重を入力してください"); return; }
  const rounded = Math.round(val * 10) / 10;
  const wlog = loadWeightLog();
  wlog[calSelectedDate] = rounded;
  saveWeightLog(wlog);
  showToast(calSelectedDate + " : " + rounded + "kg を記録しました");
  selectCalDate(calSelectedDate);
  renderCalendar();
}

function removeCalEntry(dateStr, id) {
  const log = loadLog();
  if (!log[dateStr]) return;
  log[dateStr] = log[dateStr].filter(e => e.id !== id);
  saveLog(log);
  selectCalDate(dateStr);
  renderCalendar();
}

// モーダル
function openCalAddModal() {
  if (!calSelectedDate) return;
  const parts = calSelectedDate.split("-");
  document.getElementById("modal-title").textContent =
    parts[0] + "年" + parseInt(parts[1]) + "月" + parseInt(parts[2]) + "日 に追加";
  document.getElementById("modal-search").value = "";
  modalSearch("");
  const modal = document.getElementById("cal-modal");
  modal.style.display = "flex";
  modal.style.flexDirection = "column";
  modal.style.justifyContent = "flex-end";
}

function closeCalModal() {
  document.getElementById("cal-modal").style.display = "none";
}

function modalSearch(query) {
  const allFoods = [];
  Object.entries(FOOD_DB).forEach(([cat, foods]) => {
    foods.forEach(f => allFoods.push({ ...f, category: cat }));
  });
  const list = query
    ? allFoods.filter(f => f.name.includes(query))
    : allFoods.sort((a,b) => a.carbs - b.carbs).slice(0, 30);

  const container = document.getElementById("modal-food-list");
  container.innerHTML = list.length === 0
    ? '<div style="text-align:center;color:#bbb;padding:20px;font-size:13px">見つかりませんでした</div>'
    : "";

  list.forEach(food => {
    const safeId = "modal-g-" + food.name.replace(/[^a-zA-Z0-9]/g, "_");
    const row = document.createElement("div");
    row.style.cssText = "display:flex;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0;gap:6px";
    row.innerHTML = `
      <div style="flex:1;min-width:0">
        <div style="font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${food.name}</div>
        <div style="font-size:11px;color:#888">糖質${food.carbs}g · ${food.kcal}kcal · ${food.category}</div>
      </div>
      <input type="text" inputmode="numeric" value="100" id="${safeId}"
        style="width:52px;flex-shrink:0;border:1px solid #ddd;border-radius:8px;padding:5px 4px;font-size:14px;text-align:center;font-family:inherit"
        oninput="this.value=this.value.replace(/[^0-9]/g,'')">
      <span style="font-size:12px;color:#888;flex-shrink:0">g</span>
      <button onclick="addCalEntry('${food.name.replace(/'/g,"\\'")}','${food.category}',${food.carbs},${food.kcal},${food.protein},${food.fat},${food.fiber},'${safeId}')"
        style="background:#2e7d32;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0">追加</button>`;
    container.appendChild(row);
  });
}

function addCalEntry(name, category, carbs, kcal, protein, fat, fiber, gramId) {
  if (!calSelectedDate) return;
  const g = parseInt(document.getElementById(gramId)?.value) || 100;
  const r = g / 100;
  const entry = {
    name, grams: g, category,
    kcal:    Math.round(kcal    * r * 10) / 10,
    protein: Math.round(protein * r * 10) / 10,
    fat:     Math.round(fat     * r * 10) / 10,
    carbs:   Math.round(carbs   * r * 10) / 10,
    fiber:   Math.round(fiber   * r * 10) / 10,
    time:    new Date().toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" }),
    id:      Date.now() + Math.random(),
  };
  const log = loadLog();
  if (!log[calSelectedDate]) log[calSelectedDate] = [];
  log[calSelectedDate].push(entry);
  saveLog(log);
  showToast(name + " " + g + "g を追加しました");
  closeCalModal();
  selectCalDate(calSelectedDate);
  renderCalendar();
  // 今日なら今日タブも更新
  if (calSelectedDate === getToday()) renderToday();
}

// ─── AI SEARCH ───────────────────────────────────────────
async function aiSearch() {
  const inp   = document.getElementById("ai-search-input");
  const query = inp.value.trim();
  if (!query) return;

  const sugEl = document.getElementById("search-suggestions");
  const resEl = document.getElementById("ai-result");

  // まず既存DBから部分一致検索
  const allFoods = [];
  Object.entries(FOOD_DB).forEach(([cat, foods]) => {
    foods.forEach(f => allFoods.push({ ...f, category: cat }));
  });
  const matched = allFoods.filter(f => f.name.includes(query));

  if (matched.length > 0) {
    sugEl.innerHTML = `<div style="font-size:11px;color:#888;margin-bottom:6px">${matched.length}件見つかりました</div>`;
    matched.forEach(food => {
      const row = document.createElement("div");
      row.style.cssText = "display:flex;align-items:center;padding:8px 0;border-bottom:1px solid #f0f0f0;gap:4px";
      const safeId = "sg-g-" + food.name.replace(/[^a-zA-Z0-9]/g, "_");
      row.innerHTML = `
        <div style="flex:1;min-width:0;overflow:hidden">
          <div style="font-size:14px;font-weight:600;color:#1a1a1a;white-space:nowrap;overflow:hidden;text-overflow:ellipsis">${food.name}</div>
          <div style="font-size:11px;color:#888">糖質${food.carbs}g · ${food.kcal}kcal</div>
        </div>
        <input type="text" inputmode="numeric" value="100"
          style="width:50px;flex-shrink:0;border:1px solid #ddd;border-radius:8px;padding:5px 4px;font-size:14px;text-align:center;font-family:inherit"
          id="${safeId}"
          oninput="this.value=this.value.replace(/[^0-9]/g,'')">
        <span style="font-size:12px;color:#888;flex-shrink:0">g</span>
        <button onclick="addFromSearch('${food.name.replace(/'/g,"\\'")}','${food.category}',${food.carbs},${food.kcal},${food.protein},${food.fat},${food.fiber},'${safeId}')"
          style="background:#2e7d32;color:#fff;border:none;border-radius:8px;padding:6px 10px;font-size:12px;font-weight:700;cursor:pointer;font-family:inherit;flex-shrink:0">追加</button>`;
      sugEl.appendChild(row);
    });
    resEl.innerHTML = "";
    return;
  }

  // DBにない → AIで推定
  sugEl.innerHTML = "";
