          <div style="background:#fff;border-radius:8px;padding:6px;text-align:center">
            <div style="font-size:15px;font-weight:800;color:#1565c0">${food.protein}g</div>
            <div style="font-size:10px;color:#888">タンパク</div>
          </div>
          <div style="background:#fff;border-radius:8px;padding:6px;text-align:center;grid-column:span 2">
            <div style="font-size:15px;font-weight:800;color:#00838f">${food.fiber}g</div>
            <div style="font-size:10px;color:#888">食物繊維</div>
          </div>
        </div>
        <div style="display:flex;align-items:center;gap:8px">
          <input type="text" inputmode="numeric" value="100" id="ai-gram"
            style="width:70px;border:1px solid #ddd;border-radius:8px;padding:8px;font-size:16px;text-align:center;font-family:inherit"
            oninput="this.value=this.value.replace(/[^0-9]/g,'')">
          <span style="font-size:13px;color:#888">g</span>
          <button onclick="addFromAI(${JSON.stringify(food).replace(/"/g,'&quot;')})"
            style="flex:1;background:#2e7d32;color:#fff;border:none;border-radius:8px;padding:10px;font-size:14px;font-weight:700;cursor:pointer;font-family:inherit">
            記録に追加
          </button>
        </div>
        <div style="font-size:10px;color:#bbb;margin-top:6px;text-align:center">※AI推定値です。目安としてご利用ください</div>
      </div>`;

  } catch(e) {
    resEl.innerHTML = `<div style="text-align:center;padding:16px;color:#c62828;font-size:13px">
      推定できませんでした。食材名を変えて試してください。
    </div>`;
  }

  btn.disabled = false;
  btn.textContent = "検索";
}

function addFromSearch(name, category, carbs, kcal, protein, fat, fiber, gramId) {
  const g = parseInt(document.getElementById(gramId)?.value) || 100;
  const r = g / 100;
  const entry = {
    name, grams: g, category,
    kcal:    Math.round(kcal    * r * 10) / 10,
    protein: Math.round(protein * r * 10) / 10,
    fat:     Math.round(fat     * r * 10) / 10,
    carbs:   Math.round(carbs   * r * 10) / 10,
    fiber:   Math.round(fiber   * r * 10) / 10,
    time: new Date().toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" }),
    id: Date.now() + Math.random(),
  };
  const log = loadLog();
  const today = getToday();
  if (!log[today]) log[today] = [];
  log[today].push(entry);
  saveLog(log);
  showToast(name + " " + g + "g を追加しました");
  document.getElementById("ai-search-input").value = "";
  document.getElementById("search-suggestions").innerHTML = "";
  document.getElementById("ai-result").innerHTML = "";
  switchTab("today");
  renderToday();
}

function addFromAI(foodJson) {
  const food = typeof foodJson === "string" ? JSON.parse(foodJson) : foodJson;
  const g = parseInt(document.getElementById("ai-gram")?.value) || 100;
  const r = g / 100;
  const entry = {
    name: food.name, grams: g, category: "AI検索",
    kcal:    Math.round(food.kcal    * r * 10) / 10,
    protein: Math.round(food.protein * r * 10) / 10,
    fat:     Math.round(food.fat     * r * 10) / 10,
    carbs:   Math.round(food.carbs   * r * 10) / 10,
    fiber:   Math.round((food.fiber||0) * r * 10) / 10,
    time: new Date().toLocaleTimeString("ja-JP", { hour:"2-digit", minute:"2-digit" }),
    id: Date.now() + Math.random(),
  };
  const log = loadLog();
  const today = getToday();
  if (!log[today]) log[today] = [];
  log[today].push(entry);
  saveLog(log);
  showToast(food.name + " " + g + "g を追加しました");
  document.getElementById("ai-search-input").value = "";
  document.getElementById("search-suggestions").innerHTML = "";
  document.getElementById("ai-result").innerHTML = "";
  switchTab("today");
  renderToday();
}

// ─── WEIGHT ──────────────────────────────────────────────
const WEIGHT_KEY = "keto_weight_log";
const START_WEIGHT = 80.0;

function loadWeightLog() { try { return JSON.parse(localStorage.getItem(WEIGHT_KEY) || "{}"); } catch { return {}; } }
function saveWeightLog(l) { try { localStorage.setItem(WEIGHT_KEY, JSON.stringify(l)); } catch {} }

function saveWeight() {
  const inp = document.getElementById("weight-input");
  const raw = inp.value.replace(/,/g, ".");
  const val = parseFloat(raw);
  if (isNaN(val) || val < 30 || val > 300) {
    showToast("⚠ 正しい体重を入力してください");
    return;
  }
  const rounded = Math.round(val * 10) / 10;
  const wlog = loadWeightLog();
  const today = getToday();
  wlog[today] = rounded;
  saveWeightLog(wlog);
  // 入力値はそのまま残す（消さない）
  renderWeightToday();
  showToast(rounded + "kg を記録しました");
}

function renderWeightToday() {
  const wlog = loadWeightLog();
  const today = getToday();
  const el = document.getElementById("weight-today-display");
  if (wlog[today]) {
    const diff = Math.round((wlog[today] - START_WEIGHT) * 10) / 10;
    const diffStr = diff > 0 ? "+" + diff : String(diff);
    const diffColor = diff <= 0 ? "#2e7d32" : "#c62828";
    el.innerHTML = `今日の記録: <strong style="font-size:18px;color:#1a1a1a">${wlog[today]}kg</strong>
      　開始時比: <strong style="color:${diffColor}">${diffStr}kg</strong>`;
  } else {
    el.textContent = "今日はまだ記録がありません";
  }
}

function renderWeightTab() {
  const wlog = loadWeightLog();
  const days = Object.keys(wlog).sort();
  const listEl = document.getElementById("weight-list");
  const statsEl = document.getElementById("weight-stats");

  // 一覧
  if (days.length === 0) {
    listEl.innerHTML = '<div class="empty">体重の記録がありません<br>「今日」タブから記録してください</div>';
    statsEl.innerHTML = "";
    drawWeightGraph([]);
    return;
  }

  // 統計
  const weights = days.map(d => wlog[d]);
  const latest = weights[weights.length - 1];
  const totalDiff = Math.round((latest - START_WEIGHT) * 10) / 10;
  const diffColor = totalDiff <= 0 ? "#2e7d32" : "#c62828";
  const minW = Math.min(...weights);
  const maxW = Math.max(...weights);

  statsEl.innerHTML = `
    <div style="background:#2e7d3212;border-radius:10px;padding:10px 6px;text-align:center">
      <div style="font-size:20px;font-weight:800;color:${diffColor}">${totalDiff > 0 ? "+" : ""}${totalDiff}kg</div>
      <div style="font-size:11px;color:#888;margin-top:2px">開始時比</div>
    </div>
    <div style="background:#1565c012;border-radius:10px;padding:10px 6px;text-align:center">
      <div style="font-size:20px;font-weight:800;color:#1565c0">${latest}kg</div>
      <div style="font-size:11px;color:#888;margin-top:2px">最新</div>
    </div>
    <div style="background:#e6510012;border-radius:10px;padding:10px 6px;text-align:center">
      <div style="font-size:20px;font-weight:800;color:#e65100">${days.length}日</div>
      <div style="font-size:11px;color:#888;margin-top:2px">記録日数</div>
    </div>`;

  // 一覧リスト
  listEl.innerHTML = "";
  [...days].reverse().forEach(day => {
    const w = wlog[day];
    const diff = Math.round((w - START_WEIGHT) * 10) / 10;
    const dc = diff <= 0 ? "#2e7d32" : "#c62828";
    const row = document.createElement("div");
    row.style.cssText = "display:flex;justify-content:space-between;align-items:center;padding:10px 0;border-bottom:1px solid #f0f0f0";
    row.innerHTML = `
      <div>
        <div style="font-size:15px;font-weight:700;color:#222">${day}</div>
      </div>
      <div style="text-align:right;display:flex;align-items:center;gap:12px">
        <span style="font-size:12px;color:${dc};font-weight:700">${diff > 0 ? "+" : ""}${diff}kg</span>
        <span style="font-size:20px;font-weight:800;color:#1a1a1a">${w}kg</span>
        <button onclick="deleteWeight('${day}')" style="background:none;border:1px solid #e0e0e0;color:#ccc;border-radius:6px;width:28px;height:28px;cursor:pointer;font-size:16px">×</button>
      </div>`;
    listEl.appendChild(row);
  });

  drawWeightGraph(days.map(d => ({ date: d, val: wlog[d] })));
}

function deleteWeight(day) {
  const wlog = loadWeightLog();
  delete wlog[day];
  saveWeightLog(wlog);
  renderWeightTab();
  renderWeightToday();
}

function drawWeightGraph(data) {
  const canvas = document.getElementById("weight-canvas");
  const dpr = window.devicePixelRatio || 1;
  const W = canvas.parentElement.clientWidth;
  const H = 180;
  canvas.width  = W * dpr;
  canvas.height = H * dpr;
  canvas.style.width  = W + "px";
  canvas.style.height = H + "px";
  const ctx = canvas.getContext("2d");
  ctx.scale(dpr, dpr);
  ctx.clearRect(0, 0, W, H);

  if (data.length === 0) {
    ctx.fillStyle = "#ccc";
    ctx.font = "13px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText("体重データがありません", W / 2, H / 2);
    return;
  }

  const pad = { top:20, right:16, bottom:36, left:44 };
  const gW = W - pad.left - pad.right;
  const gH = H - pad.top - pad.bottom;

  const vals = data.map(d => d.val);
  // 0.5kg刻みでY軸範囲を設定
  const minRaw = Math.min(...vals, START_WEIGHT);
  const maxRaw = Math.max(...vals, START_WEIGHT);
  const minV = Math.floor((minRaw - 0.5) * 2) / 2;  // 0.5kg単位で切り下げ
  const maxV = Math.ceil((maxRaw + 0.5) * 2) / 2;    // 0.5kg単位で切り上げ

  function xPos(i) { return pad.left + (data.length === 1 ? gW / 2 : (i / (data.length - 1)) * gW); }
  function yPos(v) { return pad.top + gH - ((v - minV) / (maxV - minV)) * gH; }

  // グリッド線（0.5kg刻み）
  ctx.strokeStyle = "#f0f0f0";
  ctx.lineWidth = 1;
  let v = minV;
  while (v <= maxV + 0.01) {
    const y = yPos(v);
    ctx.beginPath(); ctx.moveTo(pad.left, y); ctx.lineTo(pad.left + gW, y); ctx.stroke();
    ctx.fillStyle = "#bbb"; ctx.font = "11px sans-serif"; ctx.textAlign = "right";
    ctx.fillText(v.toFixed(1), pad.left - 4, y + 4);
    v = Math.round((v + 0.5) * 10) / 10;
  }

  // 開始体重の基準線
  const baseY = yPos(START_WEIGHT);
  ctx.strokeStyle = "#e0e0e0";
  ctx.setLineDash([4, 4]);
  ctx.lineWidth = 1.5;
  ctx.beginPath(); ctx.moveTo(pad.left, baseY); ctx.lineTo(pad.left + gW, baseY); ctx.stroke();
  ctx.setLineDash([]);
  ctx.fillStyle = "#bbb"; ctx.font = "10px sans-serif"; ctx.textAlign = "left";
  ctx.fillText("開始 " + START_WEIGHT + "kg", pad.left + 2, baseY - 3);

  // 折れ線グラフ
  ctx.strokeStyle = "#1565c0";
  ctx.lineWidth = 2.5;
  ctx.lineJoin = "round";
  ctx.beginPath();
  data.forEach((d, i) => {
    const x = xPos(i), y = yPos(d.val);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.stroke();

  // 塗りつぶし
  ctx.beginPath();
  data.forEach((d, i) => {
    const x = xPos(i), y = yPos(d.val);
    i === 0 ? ctx.moveTo(x, y) : ctx.lineTo(x, y);
  });
  ctx.lineTo(xPos(data.length - 1), pad.top + gH);
  ctx.lineTo(pad.left, pad.top + gH);
  ctx.closePath();
  ctx.fillStyle = "rgba(21,101,192,0.08)";
  ctx.fill();

  // データポイント＆日付
  data.forEach((d, i) => {
    const x = xPos(i), y = yPos(d.val);
    ctx.beginPath();
    ctx.arc(x, y, 4, 0, Math.PI * 2);
    ctx.fillStyle = d.val <= START_WEIGHT ? "#2e7d32" : "#c62828";
    ctx.fill();
    ctx.strokeStyle = "#fff"; ctx.lineWidth = 1.5;
    ctx.stroke();

    // 日付ラベル（最初・最後・または5日おき）
    if (i === 0 || i === data.length - 1 || i % 5 === 0) {
      const label = d.date.slice(5); // MM-DD
      ctx.fillStyle = "#aaa"; ctx.font = "10px sans-serif"; ctx.textAlign = "center";
      ctx.fillText(label, x, H - pad.bottom + 14);
    }
  });
}

function initDateSelects() {
  const inp = document.getElementById("weight-date-input");
  if (!inp) return;
  inp.value = getToday();
  updateDateLabel();
  inp.addEventListener("change", updateDateLabel);
}

function updateDateLabel() {
  const inp = document.getElementById("weight-date-input");
  const btn = document.getElementById("date-display-btn");
  if (!inp || !btn) return;
  if (!inp.value) return;
  const parts = inp.value.split("-");
  if (parts.length === 3) {
    const y = parts[0], m = parseInt(parts[1]), d = parseInt(parts[2]);
    btn.textContent = y + "年" + m + "月" + d + "日";
  }
}

function getSelectedDate() {
  return document.getElementById("weight-date-input").value;
}

function saveWeightByDate() {
  const day   = getSelectedDate();
  const valEl = document.getElementById("weight-val-input");
  const raw   = valEl.value.replace(/,/g, ".");
  const val   = parseFloat(raw);
  if (isNaN(val) || val < 30 || val > 300) { showToast("⚠ 正しい体重を入力してください"); return; }
  const rounded = Math.round(val * 10) / 10;
  const wlog = loadWeightLog();
  wlog[day] = rounded;
  saveWeightLog(wlog);
  showToast(day + " : " + rounded + "kg を記録しました");
  renderWeightTab();
  renderWeightToday();
}

// ─── EXPORT ──────────────────────────────────────────────
function exportData() {
  const data = { log: loadLog(), weight: loadWeightLog() };
  const json = JSON.stringify(data);
  if (navigator.clipboard && navigator.clipboard.writeText) {
    navigator.clipboard.writeText(json).then(() => {
      const el = document.getElementById("export-msg");
      el.textContent = "✅ コピーしました！別のブラウザで貼り付けてください";
      setTimeout(() => { el.textContent = ""; }, 4000);
    }).catch(() => { fallbackCopy(json); });
  } else {
    fallbackCopy(json);
  }
}

function fallbackCopy(text) {
  const ta = document.createElement("textarea");
  ta.value = text;
  ta.style.position = "fixed";
  ta.style.opacity = "0";
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try {
    document.execCommand("copy");
    const el = document.getElementById("export-msg");
    el.textContent = "✅ コピーしました！別のブラウザで貼り付けてください";
    setTimeout(() => { el.textContent = ""; }, 4000);
  } catch(e) {
    const el = document.getElementById("export-msg");
    el.textContent = "⚠ 手動でコピーしてください";
    el.style.color = "#c62828";
  }
  document.body.removeChild(ta);
}

// ─── IMPORT ──────────────────────────────────────────────
function importData() {
  const input = document.getElementById("import-input").value.trim();
  const msgEl = document.getElementById("import-msg");
  if (!input) {
    msgEl.textContent = "⚠ データを貼り付けてください";
    msgEl.style.color = "#c62828";
    return;
  }
  try {
    const parsed = JSON.parse(input);
    if (typeof parsed !== "object" || Array.isArray(parsed)) throw new Error();
    // 新形式（log + weight）と旧形式（logのみ）の両方に対応
    if (parsed.log && parsed.weight) {
      saveLog(parsed.log);
      saveWeightLog(parsed.weight);
    } else {
      saveLog(parsed);
    }
    document.getElementById("import-input").value = "";
    msgEl.textContent = "✅ データを復元しました！";
    msgEl.style.color = "#2e7d32";
    setTimeout(() => {
      msgEl.textContent = "";
      switchTab("today");
      renderToday();
      renderWeightToday();
    }, 1500);
  } catch(e) {
    msgEl.textContent = "⚠ データが正しくありません。もう一度コピーして貼り付けてください";
    msgEl.style.color = "#c62828";
  }
}

// ─── TOAST ───────────────────────────────────────────────
function showToast(msg) {
  let el = document.getElementById("toast-el");
  if (!el) {
    el = document.createElement("div");
    el.id = "toast-el";
    el.className = "toast";
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.display = "block";
  if (toastTimer) clearTimeout(toastTimer);
  toastTimer = setTimeout(() => { el.style.display = "none"; }, 2200);
}
</script>

